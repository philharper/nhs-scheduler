spring.application.name=nhs-scheduler
server.port=8080
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/nhs-scheduler}
scheduler.data-file=data/schedule-state.json
scheduler.legacy-migration.enabled=true
scheduler.auth.username=${SCHEDULER_AUTH_USERNAME:admin}
scheduler.auth.password=${SCHEDULER_AUTH_PASSWORD:change-me}
