name: Deploy NHS Scheduler

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build application
        run: mvn -B package -DskipTests

      - name: Copy JAR to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "target/*.jar"
          target: "/srv/apps/nhs-scheduler"

      - name: Restart service
        uses: appleboy/ssh-action@v1.0.3
        env:
          SCHEDULER_AUTH_USERNAME: ${{ secrets.SCHEDULER_AUTH_USERNAME }}
          SCHEDULER_AUTH_PASSWORD: ${{ secrets.SCHEDULER_AUTH_PASSWORD }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: SCHEDULER_AUTH_USERNAME,SCHEDULER_AUTH_PASSWORD
          script: |
            mv /srv/apps/nhs-scheduler/target/*.jar /srv/apps/nhs-scheduler/app.jar
            mkdir -p /etc/systemd/system/nhs-scheduler.service.d
            cat <<EOF >/etc/systemd/system/nhs-scheduler.service.d/override.conf
            [Service]
            Environment="SCHEDULER_AUTH_USERNAME=${SCHEDULER_AUTH_USERNAME}"
            Environment="SCHEDULER_AUTH_PASSWORD=${SCHEDULER_AUTH_PASSWORD}"
            EOF
            systemctl daemon-reload
            systemctl restart nhs-scheduler
